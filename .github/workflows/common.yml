name: build-image

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string

env:
  RELEASE_VERSION: 6.10.1 ## BlockScout Release version

jobs:
  build_image:
    name: Push Docker image to Docker Hub
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    env:
      IMAGE_TAG:  ${{ github.ref_name }}
    outputs:
      IMAGE_TAG: ${{ env.IMAGE_TAG }}
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Get Env Name
        id: env
        run: |
          TAG=${{ github.ref_name }}
          echo "GIT_TAG=$(echo $TAG | cut -d'-' -f1)" >> $GITHUB_OUTPUT
          echo $GIT_TAG

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.ACCOUNT_ID }}:role/${{ secrets.OIDC_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to AWS ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
          
      - name: Build Frontend
        uses: docker/build-push-action@v6
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        with:
          context: .
          file: ./Dockerfile  # frontend를 위한 Dockerfile 경로로 변경 필요
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags:  ${{ env.ECR_REGISTRY }}/${{ inputs.environment }}/${{ secrets.AWS_ECR_REPO }}-frontend:${{ steps.env.outputs.GIT_TAG }},${{ env.ECR_REGISTRY }}/${{ inputs.environment }}/${{ secrets.AWS_ECR_REPO }}-frontend:latest
          platforms: linux/amd64
          build-args: |
            GIT_COMMIT_SHA=${{ env.GIT_SHA }}
            GIT_TAG=v1.37.6 ## Fork Version